name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the suggestion!"

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What are you currently unable to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like, including any UI or API changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other approaches you considered or workarounds you currently use?

  - type: checkboxes
    id: willing_to_pr
    attributes:
      label: Would you like to implement this?
      options:
        - label: "Yes, I'd like to open a PR for this"
