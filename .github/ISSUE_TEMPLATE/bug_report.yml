name: Bug report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"

  - type: input
    id: ide_version
    attributes:
      label: IDE version
      placeholder: "e.g. IntelliJ IDEA 2024.2.4 (IC-242.22855.74)"
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: Agent used
      placeholder: "e.g. Claude Code 0.2.0, GitHub Copilot CLI"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AgentPort panel
        2. Select agent X
        3. Type "..."
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: "Paste any relevant output from Help → Show Log in Files"
      render: text
